<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微信麻将 · 联机版</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background:#0a7d4f; color:#fff; user-select:none; -webkit-user-select:none; }
  #app { max-width: 520px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; padding:10px 14px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; font-size:15px; padding:8px 6px; }
  .topbar button { background:#ffce54; border:none; border-radius:8px; padding:6px 12px; font-size:15px; font-weight:700; color:#333; }
  #msg { text-align:center; font-size:13px; min-height:18px; padding:4px 2px; color:#ffe; }
  .middle { display:flex; flex:1; gap:12px; align-items:stretch; }
  .side { display:flex; flex-direction:column; justify-content:center; width:72px; }
  .center { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; margin:0 6px; }
  .opponent, .human { background:rgba(0,0,0,.12); border-radius:10px; padding:10px; margin:8px 0; }
  #op-top { margin-bottom:10px; }
  #human { margin-top:10px; }
  .pname { font-size:13px; font-weight:600; margin-bottom:3px; }
  .pname.active { color:#ffce54; }
  .row, .hand-row, .discards, .melds { display:flex; flex-wrap:wrap; gap:3px; }
  .melds { margin-bottom:3px; }
  .meld { display:flex; gap:1px; padding:1px; background:rgba(0,0,0,.15); border-radius:4px; }
  .discards { margin:3px 0; }
  .tile { width:32px; height:44px; background:#fbfbf7; color:#222; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; line-height:1; box-shadow:0 2px 3px rgba(0,0,0,.35); border:1px solid #ddd; }
  .tile.mini { width:22px; height:30px; font-size:12px; border-radius:5px; }
  .tile.hand { width:36px; height:50px; font-size:19px; }
  .tile.wan { color:#c0392b; } .tile.tiao { color:#1e8449; } .tile.tong { color:#2471a3; } .tile.zi { color:#333; }
  .tile.zi.z-zhong { color:#c0392b; } .tile.zi.z-fa { color:#1e8449; } .tile.zi.z-bai { color:#2471a3; } .tile.zi.z-feng { color:#2c3e50; }
  .tile-back { width:24px; height:34px; background:linear-gradient(135deg,#2c7a4b,#1c5c38); border-radius:5px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.15); }
  .tile-back.mini { width:18px; height:25px; }
  #myHand { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; padding:8px 4px; min-height:56px; overflow-x:auto; }
  .act-btn { background:#ffce54; color:#333; border:none; border-radius:8px; padding:10px 16px; font-size:16px; font-weight:700; min-width:70px; box-shadow:0 2px 0 #c9a227; }
  .act-btn:active { transform:translateY(1px); box-shadow:0 1px 0 #c9a227; }
  #actions { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; padding:8px; min-height:48px; }
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:50; padding:16px; }
  .result-card { background:#fff; color:#222; border-radius:14px; padding:20px; max-width:360px; width:100%; text-align:center; max-height:86vh; overflow:auto; }
  .result-card h2 { margin:0 0 10px; color:#c0392b; }
  .result-card p { margin:6px 0; }
  .res-hand { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; margin:6px 0 12px; }
  /* 大厅 */
  #lobby { padding:10px; }
  .card { background:rgba(0,0,0,.15); border-radius:12px; padding:14px; margin:8px 0; }
  .card input { width:100%; padding:8px; border-radius:8px; border:none; font-size:15px; margin:6px 0; }
  .card button { width:100%; background:#ffce54; color:#333; border:none; border-radius:8px; padding:10px; font-size:15px; font-weight:700; margin:4px 0; }
  .seat { display:flex; justify-content:space-between; padding:6px 8px; background:rgba(255,255,255,.1); border-radius:8px; margin:4px 0; font-size:14px; }
  .seat.empty { opacity:.5; }
  .hidden { display:none !important; }
  .code { font-size:22px; font-weight:800; letter-spacing:3px; color:#ffce54; }
  /* 动画：弃牌落子 + 回合光晕 + 胡牌皇冠（对应斗地主筹码/地主特效） */
  #center .tile.drop { animation: tileDrop .4s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes tileDrop { 0%{ transform:scale(.5) translateY(-18px); opacity:0; } 60%{ opacity:1; } 100%{ transform:scale(1) translateY(0); } }
  #center.flash { animation: centerFlash .5s ease; }
  @keyframes centerFlash { 0%{ filter:none; } 30%{ filter:drop-shadow(0 0 12px #ffd54a); } 100%{ filter:none; } }
  .active-glow { animation: turnGlow 1.5s ease-in-out infinite; border-radius:10px; }
  @keyframes turnGlow { 0%,100%{ box-shadow:0 0 6px 1px rgba(255,206,84,.5); } 50%{ box-shadow:0 0 16px 4px rgba(255,206,84,.9); } }
  .seat-win > .pname::before { content:'👑 '; }
  .seat-win { animation: winGlow 1.6s ease-in-out infinite; border-radius:10px; }
  @keyframes winGlow { 0%,100%{ box-shadow:0 0 8px 2px rgba(255,206,84,.6); } 50%{ box-shadow:0 0 20px 6px rgba(255,206,84,.95); } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><span id="wallinfo">联机麻将</span><span><button onclick="location.href='home.html'">🏠 主页</button><button id="voiceBtn" onclick="toggleVoice()" title="语音开关">🔊</button><button onclick="backLobby()">大厅</button></span></div>
  <div id="msg">未连接</div>

  <div id="lobby">
    <div class="card">
      <div style="font-size:14px;opacity:.9">输入昵称后开始</div>
      <input id="nameInput" placeholder="你的昵称" maxlength="8" value="玩家">
      <select id="modeSelect" style="width:100%;padding:8px;border-radius:8px;border:none;font-size:15px;margin:6px 0">
        <option value="gb">国标简化版（万条筒+字牌，吃碰杠胡）</option>
        <option value="gd">广东麻将（万条筒+字牌，吃碰杠胡）</option>
        <option value="sc">四川血战到底（万条筒，定缺/禁吃/续打）</option>
      </select>
      <button onclick="quickStart()">⚡ 快速开始（人机各半，缺人补机器人）</button>
      <button onclick="createRoom()">创建房间（等人加入）</button>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input id="codeInput" placeholder="房间号" maxlength="4" style="flex:1">
        <button style="width:auto;padding:10px 16px" onclick="joinRoom()">加入</button>
        <button style="width:auto;padding:10px 16px" onclick="spectateRoom()">👁 观战</button>
      </div>
    </div>
    <div class="card hidden" id="roomCard">
      <div>房间号：<span class="code" id="roomCode"></span> <button style="width:auto;padding:4px 8px;font-size:12px" onclick="copyCode()">复制</button></div>
      <div style="font-size:13px;opacity:.85;margin-top:2px">玩法：<b id="roomMode" style="color:#ffce54">国标简化版</b></div>
      <div id="seatList"></div>
      <button id="startBtn" class="hidden" onclick="startGame()">开始游戏</button>
      <div style="font-size:12px;opacity:.8;margin-top:6px">把房间号发给好友，对方选「加入」即可同场对战；空位会自动补机器人。</div>
    </div>
  </div>

  <div id="game" class="hidden">
    <div class="opponent" id="op-top"></div>
    <div class="middle">
      <div class="side opponent" id="op-left"></div>
      <div class="center" id="center"></div>
      <div class="side opponent" id="op-right"></div>
    </div>
    <div class="human" id="human"></div>
    <div id="actions"></div>
  </div>
</div>
<div id="overlay"></div>

<script>
// ===================== 工具 =====================
function ti(t){ const s=t[0], r=+t.slice(1); if(s==='m') return r-1; if(s==='s') return 9+r-1; if(s==='p') return 18+r-1; return 27+r-1; }
function tileLabel(t){ let s=t[0], r=+t.slice(1); if(s==='z') return ['东','南','西','北','中','發','白'][r-1]; const num=['一','二','三','四','五','六','七','八','九'][r-1]; const suit={m:'萬',s:'条',p:'筒'}[s]; return num+suit; }
function tileClass(t){ return {m:'wan',s:'tiao',p:'tong',z:'zi'}[t[0]]; }
function tileExtraClass(t){ if(t[0]!=='z') return ''; let r=+t.slice(1); return r===5?'z-zhong':r===6?'z-fa':r===7?'z-bai':'z-feng'; }
function actionName(a){ return {hu:'胡',pung:'碰',kong:'杠',chow:'吃',pass:'过',zimo:'自摸'}[a]||a; }

// ===================== WebSocket =====================
let ws=null, mySeat=-1, myCode='';
function connect(cb){
  if(ws && ws.readyState===1){ cb&&cb(); return; }
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{ setMsg('已连接'); cb&&cb(); };
  ws.onclose=()=>{ setMsg('连接断开，请刷新'); };
  ws.onmessage=(e)=>{ const m=JSON.parse(e.data); onMessage(m); };
}
function send(m){ if(ws && ws.readyState===1) ws.send(JSON.stringify(m)); }

function modeVal(){ const el=document.getElementById('modeSelect'); return (el&&el.value)||'gb'; }
function quickStart(){ unlockVoice(); connect(()=>{ send({type:'quickstart', name:nameVal(), score:getStoredScore(nameVal()), mode:modeVal()}); }); }
function createRoom(){ unlockVoice(); connect(()=>{ send({type:'create', name:nameVal(), score:getStoredScore(nameVal()), mode:modeVal()}); }); }
function joinRoom(){ unlockVoice(); const c=(document.getElementById('codeInput').value||'').toUpperCase().trim(); if(!c){ alert('请输入房间号'); return; } connect(()=>{ send({type:'join', name:nameVal(), code:c, score:getStoredScore(nameVal())}); }); }
function spectateRoom(){ unlockVoice(); const c=(document.getElementById('codeInput').value||'').toUpperCase().trim(); if(!c){ alert('请输入房间号'); return; } connect(()=>{ send({type:'spectate', name:nameVal(), code:c}); }); }
function startGame(){ send({type:'start'}); }
function nameVal(){ return (document.getElementById('nameInput').value||'玩家').trim()||'玩家'; }
function copyCode(){ if(!myCode) return; navigator.clipboard && navigator.clipboard.writeText(myCode); setMsg('房间号已复制：'+myCode); }
function getStoredScore(name){ let v=0; try{ v=parseInt(localStorage.getItem('mj_score_'+name))||0; }catch(e){} return v; }
function setStoredScore(name, score){ try{ localStorage.setItem('mj_score_'+name, String(score)); }catch(e){} }

function onMessage(m){
  if(m.type==='joined'){ mySeat=m.seat; myCode=m.code; showGame(); document.getElementById('roomCode').textContent=m.code; }
  else if(m.type==='error'){ alert(m.msg); }
  else if(m.type==='lobby'){ renderLobby(m); }
  else if(m.type==='action'){ playActionVoice(m); }
  else if(m.type==='state'){ renderState(m); }
}

// ===================== 语音（吃碰杠胡） =====================
let voiceOn=true;
const VOICE_FILES={}; // 升级真人录音：把 mp3 放进 public/voices/ 后填 {chow:'voices/chi.mp3',pung:'voices/peng.mp3',kong:'voices/gang.mp3',hu:'voices/hu.mp3',zimo:'voices/zimo.mp3'}，将自动优先于 TTS
let _voiceReady=false;
function unlockVoice(){ if(_voiceReady) return; try{ const u=new SpeechSynthesisUtterance(''); u.volume=0; speechSynthesis.speak(u); speechSynthesis.cancel(); _voiceReady=true; }catch(e){} }
function sayWord(text, key){
  if(!voiceOn) return; unlockVoice();
  try{
    if(VOICE_FILES[key]){ const a=new Audio(VOICE_FILES[key]); a.play().catch(()=>{}); return; }
    const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=1.15; u.pitch=1;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
function playActionVoice(m){
  const map={chow:['吃','chi'],pung:['碰','peng'],kong:['杠','gang'],hu:['胡','hu'],zimo:['自摸','zimo']};
  const it=map[m.action]; if(it) sayWord(it[0], it[1]);
}
function toggleVoice(){ voiceOn=!voiceOn; const b=document.getElementById('voiceBtn'); if(b) b.textContent=voiceOn?'🔊':'🔇'; if(!voiceOn){ try{ speechSynthesis.cancel(); }catch(e){} } }

// ===================== 大厅渲染 =====================
function showGame(){ document.getElementById('lobby').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); }
function backLobby(){ document.getElementById('game').classList.add('hidden'); document.getElementById('lobby').classList.remove('hidden'); if(mySeat===-1){ send({type:'leave'}); } mySeat=-1; }
function renderLobby(m){
  document.getElementById('lobby').classList.remove('hidden'); document.getElementById('game').classList.add('hidden');
  document.getElementById('roomCard').classList.remove('hidden');
  document.getElementById('roomCode').textContent=m.code;
  document.getElementById('roomMode').textContent=({gb:'国标简化版',gd:'广东麻将',sc:'四川血战到底'}[m.mode||'gb']||'国标简化版');
  let html='';
  for(let s=0;s<4;s++){ const p=m.players[s]; const empty=!p||!p.name;
    html+='<div class="seat '+(empty?'empty':'')+'"><span>'+(empty?'空位（补机器人）':(p.name+(p.isBot?' 🤖':'')))+'</span>'+(s===m.host?'<span>房主</span>':'')+'</div>';
  }
  document.getElementById('seatList').innerHTML=html;
  const startBtn=document.getElementById('startBtn');
  if(mySeat===m.host && !m.started){ startBtn.classList.remove('hidden'); } else { startBtn.classList.add('hidden'); }
}

// ===================== 牌桌渲染 =====================
function setMsg(t){ document.getElementById('msg').textContent=t; }
// 座位特效（回合光晕 / 胡牌皇冠）与中央弃牌落子动画
function seatEls(){ return [document.getElementById('human'), document.getElementById('op-right'), document.getElementById('op-top'), document.getElementById('op-left')]; }
function clearSeatFx(){ seatEls().forEach(el=>{ if(el) el.classList.remove('active-glow','seat-win'); }); }
function applySeatFx(v, youSeat){
  clearSeatFx();
  const els=seatEls();
  const vis = (youSeat>=0)
    ? (srv)=>{ if(srv===youSeat) return 0; if(srv===(youSeat+1)%4) return 1; if(srv===(youSeat+2)%4) return 2; if(srv===(youSeat+3)%4) return 3; return -1; }
    : (srv)=>({0:1,1:2,2:3,3:0}[srv]);
  if(v.turn!=null){ const i=vis(v.turn); if(i>=0 && els[i]) els[i].classList.add('active-glow'); }
  if(v.winner){ const wseats = (v.winner.winnerSeat!=null) ? [v.winner.winnerSeat] : (Array.isArray(v.winner.winners)?v.winner.winners:[]); wseats.forEach(s=>{ const i=vis(s); if(i>=0 && els[i]) els[i].classList.add('seat-win'); }); }
}
function centerDiscard(v){
  const c=document.getElementById('center');
  const key = v.lastDiscard ? (v.lastDiscard.seat+'_'+v.lastDiscard.tile) : '';
  c.innerHTML='';
  if(v.lastDiscard){ const t=v.lastDiscard.tile; c.innerHTML=tileHTML(t,'hand')+'<div style="font-size:11px;opacity:.8;margin-top:4px">'+v.players[v.lastDiscard.seat].name+' 打出</div>'; }
  if(key && key!==prevDiscardKey){
    const tileEl=c.querySelector('.tile'); if(tileEl) tileEl.classList.add('drop');
    c.classList.remove('flash'); void c.offsetWidth; c.classList.add('flash');
  }
  prevDiscardKey=key;
}
function tileHTML(t, cls){ return '<div class="tile '+cls+' '+tileClass(t)+' '+tileExtraClass(t)+'">'+tileLabel(t)+'</div>'; }
function backHTML(cls){ return '<div class="tile-back '+cls+'"></div>'; }
function meldHTML(m){ let s='<div class="meld">'; for(const t of m.tiles) s+=tileHTML(t,'mini'); return s+'</div>'; }
function seatHTML(p, isBottom){
  let h='<div class="pname'+(turnSeat===p.seat?' active':'')+'">'+p.name+(p.isBot?' 🤖':'')+(p.hu?' 🀄':'')+'（'+(isBottom?p.hand.length:p.handCount)+'张） <span style="color:#ffce54">'+(curScores[p.seat]||0)+'分</span></div>';
  for(const m of p.melds) h+=meldHTML(m);
  h+='<div class="discards">'; for(const t of p.discards) h+=tileHTML(t,'mini'); h+='</div>';
  if(!isBottom){ h+='<div class="hand-row">'; for(let i=0;i<p.handCount;i++) h+=backHTML('mini'); h+='</div>'; }
  return h;
}
function seatHTMLFull(p){
  if(!p||!p.name) return '<div class="pname empty">空位</div>';
  let h='<div class="pname'+(turnSeat===p.seat?' active':'')+'">'+p.name+(p.isBot?' 🤖':'')+(p.hu?' 🀄':'')+'（'+(p.hand?p.hand.length:p.handCount)+'张） <span style="color:#ffce54">'+(curScores[p.seat]||0)+'分</span></div>';
  for(const m of (p.melds||[])) h+=meldHTML(m);
  h+='<div class="discards">'; for(const t of (p.discards||[])) h+=tileHTML(t,'mini'); h+='</div>';
  h+='<div class="hand-row">'; for(const t of (p.hand||[])) h+='<div class="tile mini '+tileClass(t)+' '+tileExtraClass(t)+'">'+tileLabel(t)+'</div>'; h+='</div>';
  return h;
}
function renderSpectator(v){
  showGame();
  const P=v.players;
  const MODE=({gb:'国标',gd:'广东',sc:'血战'}[v.mode||'gb']||'国标');
  document.getElementById('wallinfo').textContent='👁 观战中 · '+MODE+' · 牌墙:'+v.wallCount;
  const top=P[1], right=P[0], left=P[2], bottom=P[3];
  document.getElementById('op-top').innerHTML=seatHTMLFull(top);
  document.getElementById('op-right').innerHTML=seatHTMLFull(right);
  document.getElementById('op-left').innerHTML=seatHTMLFull(left);
  let h='<div class="pname" style="color:#ffce54">👁 观战中（你不是玩家）</div>';
  if(bottom && bottom.name){
    h+='<div class="pname">'+bottom.name+(bottom.isBot?' 🤖':'')+(bottom.hu?' 🀄':'')+'（'+(bottom.hand?bottom.hand.length:bottom.handCount)+'张） <span style="color:#ffce54">'+(v.scores[3]||0)+'分</span></div>';
    for(const m of (bottom.melds||[])) h+=meldHTML(m);
    h+='<div class="discards">'; for(const t of (bottom.discards||[])) h+=tileHTML(t,'mini'); h+='</div>';
    h+='<div class="hand-row" id="myHand">'; for(const t of (bottom.hand||[])) h+='<div class="tile hand '+tileClass(t)+' '+tileExtraClass(t)+'">'+tileLabel(t)+'</div>'; h+='</div>';
  }
  document.getElementById('human').innerHTML=h;
  centerDiscard(v);
  renderActions(v);
  applySeatFx(v, v.youSeat);
  if(v.winner) showResult(v); else document.getElementById('overlay').style.display='none';
}

let turnSeat=-1;
let curScores=[0,0,0,0];
let resultProcessed=false;
let prevDiscardKey='';
function renderState(v){
  if(!v.winner) resultProcessed=false;
  mySeat=v.youSeat; turnSeat=v.turn; curScores=v.scores||[0,0,0,0];
  showGame();
  if(mySeat<0){ renderSpectator(v); return; }
  const MODE=({gb:'国标',gd:'广东',sc:'血战'}[v.mode||'gb']||'国标');
  document.getElementById('wallinfo').textContent=MODE+' · 牌墙: '+v.wallCount;
  const P=v.players;
  const bottom=P[v.youSeat], right=P[(v.youSeat+1)%4], top=P[(v.youSeat+2)%4], left=P[(v.youSeat+3)%4];
  document.getElementById('op-top').innerHTML=seatHTML(top,false);
  document.getElementById('op-right').innerHTML=seatHTML(right,false);
  document.getElementById('op-left').innerHTML=seatHTML(left,false);

  // 底部（自己）
  let h='<div class="pname'+(turnSeat===v.youSeat?' active':'')+'">'+bottom.name+'（'+bottom.hand.length+'张） <span style="color:#ffce54">'+(curScores[v.youSeat]||0)+'分</span></div>';
  for(const m of bottom.melds) h+=meldHTML(m);
  h+='<div class="discards">'; for(const t of bottom.discards) h+=tileHTML(t,'mini'); h+='</div>';
  h+='<div class="hand-row" id="myHand">';
  const canDiscard = v.yourActions && v.yourActions.type==='discard';
  for(const t of bottom.hand){ h+='<div class="tile hand '+tileClass(t)+' '+tileExtraClass(t)+'"'+(canDiscard?' data-t="'+t+'"':'')+'>'+tileLabel(t)+'</div>'; }
  h+='</div>';
  document.getElementById('human').innerHTML=h;
  if(canDiscard){ document.querySelectorAll('#myHand .tile').forEach(el=>{ el.style.cursor='pointer'; el.onclick=()=>{ unlockVoice(); send({type:'discard', tile:el.getAttribute('data-t')}); }; }); }

  // 中央：最近打出（落子动画）
  centerDiscard(v);

  renderActions(v);
  applySeatFx(v, v.youSeat);
  if(v.winner) showResult(v); else document.getElementById('overlay').style.display='none';
}

function renderActions(v){
  const bar=document.getElementById('actions'); bar.innerHTML='';
  const ya=v.yourActions; if(!ya) return;
  if(ya.type==='dingque'){
    const dn={m:'万',s:'条',p:'筒'};
    for(const suit of ya.options){
      const b=document.createElement('button'); b.className='act-btn'; b.textContent='定缺 '+dn[suit];
      b.onclick=()=>send({type:'dingque', suit});
      bar.appendChild(b);
    }
    return;
  }
  if(ya.type==='discard'){
    for(const o of ya.self){
      const b=document.createElement('button'); b.className='act-btn'; b.textContent=o.label;
      if(o.action==='zimo') b.onclick=()=>send({type:'zimo'});
      else b.onclick=()=>send({type:o.action, tile:o.tile});
      bar.appendChild(b);
    }
  } else if(ya.type==='claim'){
    for(const o of ya.options){
      const b=document.createElement('button'); b.className='act-btn';
      b.textContent = o.action==='chow' ? ('吃 '+tileLabel(o.tiles[0])+tileLabel(o.tiles[1])) : (o.label||actionName(o.action));
      b.onclick=()=>send({type:'claim', action:o.action, tiles:o.tiles});
      bar.appendChild(b);
    }
    const pass=document.createElement('button'); pass.className='act-btn'; pass.textContent='过'; pass.onclick=()=>send({type:'claim', action:'pass'}); bar.appendChild(pass);
  }
}

function showResult(v){
  if(resultProcessed) return;
  resultProcessed=true;
  const w=v.winner;
  if(!w.draw && mySeat>=0){
    const nm=nameVal();
    let d;
    if(w.scEnd && w.roundDeltas){ d = w.roundDeltas[mySeat]||0; }
    else { d = (w.deltas&&w.deltas[mySeat])||0; }
    setStoredScore(nm, getStoredScore(nm)+d);
  }
  let html='<div class="result-card">';
  if(w.scEnd){
    html+='<h2>血战到底 · 结束</h2>';
    if(w.huInfos && w.huInfos.length){
      for(const info of w.huInfos){ html+='<p><b>'+info.name+'</b> '+info.fan+(info.selfDraw?' <span style="color:#2471a3">自摸</span>':'')+' <span style="color:#c0392b">+'+(info.delta)+'分</span></p>'; }
    } else {
      html+='<p>本局无人胡牌（流局）</p>';
    }
    if(w.deltas && w.deltas.some(x=>x!==0)) html+='<p style="font-size:12px;color:#888">含查叫结算，见积分榜</p>';
  } else if(w.draw){ html+='<h2>流局</h2><p>牌墙已摸完，本局荒庄。</p>'; }
  else { html+='<h2>'+(w.selfDraw?'自摸胡牌！':'胡牌！')+'</h2>';
    for(const info of w.info){ html+='<p><b>'+info.name+'</b> '+info.fan+' <span style="color:#c0392b">+'+(info.delta)+'分</span></p><div class="res-hand">'; for(const t of info.hand) html+=tileHTML(t,'mini'); html+='</div>'; }
  }
  // 积分榜
  html+='<div style="margin-top:10px;border-top:1px solid #eee;padding-top:8px">';
  html+='<div style="font-size:13px;color:#888;margin-bottom:4px">积分榜</div>';
  const sc=v.scores||[];
  for(let s=0;s<4;s++){ const p=v.players[s]; if(!p||!p.name) continue;
    html+='<div style="display:flex;justify-content:space-between;font-size:14px;padding:2px 0"><span>'+p.name+(p.isBot?' 🤖':'')+'</span><b>'+(sc[s]||0)+'分</b></div>';
  }
  html+='</div>';
  html+='<button class="act-btn" onclick="send({type:\'again\'})">再来一局</button></div>';
  const ov=document.getElementById('overlay'); ov.innerHTML=html; ov.style.display='flex';
}
</script>
